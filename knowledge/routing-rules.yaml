      confidence: "medium"
      
    # 部分匹配 + 低复杂度
    - x: "partial"
      y: "low"
      route: "template-combination"
      confidence: "medium"
      
    # 部分匹配 + 中复杂度
    - x: "partial"
      y: "medium"
      route: "hybrid"
      confidence: "medium"
      
    # 部分匹配 + 高复杂度
    - x: "partial"
      y: "high"
      route: "hybrid"

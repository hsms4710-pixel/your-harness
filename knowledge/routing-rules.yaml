```

## 路由执行

```yaml
execution:
  # 路由执行流程
  process:
    # 1. 分析项目特征
    1_analyze:
      use: "project-analysis"
      output: "project_features"
      
    # 2. 计算模板匹配度
    2_match:
      for template in meta-templates:
        score = compute_similarity(project_features, template.triggers)
        if score >= 0.9:
          add_to_matched_templates(template, score)
          
    # 3. 计算项目复杂度
    3_complexity:
      complexity = compute_complexity(project_features)
      # 基于特征数量、依赖关系、特殊要求等
      
    # 4. 应用路由规则
    4_route:
      for rule in routing_rules:
        if evaluate_condition(rule.condition):
          selected_route = rule.route
          break
          
    # 5. 执行路由
    5_execute:
      if selected_route == "template-based":
        execute_template_based(project_features, matched_templates)
        
      elif selected_route == "template-combination":
        execute_template_combination(project_features, decomposed_patterns)
        
      elif selected_route == "hybrid":
        execute_hybrid(project_features, matched_templates, unmatched_features)
        
      elif selected_route == "capability-driven":
        execute_capability_driven(project_features)
        
      elif selected_route == "skeleton-only":
        execute_skeleton_only(project_features)
```

## 路由结果

```yaml
routing_result:
  # 路由结果结构
  structure:
    project_name: string
    analysis_timestamp: datetime
    
    # 项目分析结果
    project_features:
      - name: string
        confidence: string
        signals: array
        
    # 模板匹配结果
    template_matching:
      matched_templates:
        - template_id: string
          match_score: float
          matched_features: array
          
      unmatched_features:
        - feature_name: string
          reason: string
          
    # 路由决策
    routing_decision:
      selected_route: string  # template-based | template-combination | hybrid | capability-driven | skeleton-only
      confidence: string  # high | medium | low
      reason: string
      
    # 执行计划
    execution_plan:
      capabilities_to_use: array
      templates_to_use: array
      elements_to_use: array
      
    # 预期输出
    expected_output:
      depth: string  # full | medium | light
      artifacts: array
```

## 路由示例

### 示例 1: React 前端项目

```yaml
project:
  name: "my-react-app"
  features:
    - name: "frontend-project"
      confidence: "high"
      
    - name: "react-app"
      confidence: "high"
      
  complexity: "low"

routing_result:
  selected_route: "template-based"
  confidence: "high"
  matched_templates:
    - "TEMPLATE-react-feature.md"
    
  reason: "项目特征完全匹配 React 前端模板，复杂度低"
```

### 示例 2: AI + React 项目

```yaml
project:
  name: "my-ai-web-app"
  features:
    - name: "ai-llm-project"
      confidence: "high"
      
    - name: "react-app"
      confidence: "high"
      
  complexity: "medium"

routing_result:
  selected_route: "template-combination"
  confidence: "medium"
  matched_templates:
    - "TEMPLATE-ai-feature.md"
    - "TEMPLATE-react-feature.md"
    
  reason: "项目可以分解为 AI 和 React 两个已知模式"
```

### 示例 3: AI Agent 项目（部分匹配）

```yaml
project:
  name: "my-ai-agent"
  features:
    - name: "ai-llm-project"
      confidence: "high"
      
    - name: "agent-orchestration"
      confidence: "high"
      
  complexity: "high"

routing_result:
  selected_route: "hybrid"
  confidence: "medium"
  matched_templates:
    - "TEMPLATE-ai-feature.md"
    
  unmatched_features:
    - feature: "agent-orchestration"
      handling: "capability-reasoning"
      
  reason: "AI 部分有匹配模板，Agent 编排部分需要元能力推理"
```


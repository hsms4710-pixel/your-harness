# 智能路由规则

## 路由决策流程

```yaml
routing_decision:
  name: "混合模式路由决策"
  description: "决定使用元模板还是元能力生成"
  
  # 决策流程
  decision_flow:
    # Step 1: 检查是否有匹配的元模板
    1_template_check:
      action: "在元模板库中查找匹配的模板"
      
      matching_criteria:
        - "项目特征完全匹配元模板的触发条件"
        - "元模板的置信度 >= 0.9"
        - "元模板已验证有效"
        
      if_match:
        route: "template-based"
        confidence: "high"
        
    # Step 2: 检查是否可以组合多个元模板
    2_combination_check:
      action: "检查是否可以组合多个元模板"
      
      matching_criteria:
        - "项目特征可以分解为多个已知模式"
        - "每个模式都有对应的元模板"
        - "模板之间可以无冲突组合"
        
      if_match:
        route: "template-combination"
        confidence: "medium"
        
    # Step 3: 使用元能力推理
    3_capability_check:
      action: "使用元能力进行推理"
      
      if_no_template_match:
        route: "capability-driven"
        confidence: "medium"
        
    # Step 4: 混合模式
    4_hybrid_check:
      action: "组合元模板和元能力"
      
      if_partial_match:
        route: "hybrid"
        confidence: "medium"
```

## 路由规则

### 规则 1: 完全匹配路由

```yaml
rule_id: RT-001
name: full-template-match
priority: 1

condition:
  all:
    - "has_matching_template == true"
    - "template_confidence >= 0.9"
    - "template_is_verified == true"

action:
  route: "template-based"
  use: "matched_template"
  
  # 仍然使用元能力进行微调
  capability_enhancement:
    - "project-analysis"  # 验证模板匹配
    - "knowledge-composition"  # 组合补充元素
    
confidence: "high"

example:
  project: "标准 React 前端项目"
  matched_template: "TEMPLATE-react-feature.md"
  confidence: 0.95
  route: "template-based"
```

### 规则 2: 组合匹配路由

```yaml
rule_id: RT-002
name: template-combination
priority: 2

condition:
  all:
    - "can_decompose_to_known_patterns == true"
    - "all_patterns_have_templates == true"
    - "templates_can_combine_without_conflict == true"

action:
  route: "template-combination"
  use:
    - "decomposed_patterns"
    - "corresponding_templates"
    
  # 使用知识组合元能力
  capability_enhancement:
    - "knowledge-composition"  # 组合模板
    - "flow-generation"  # 生成组合结果
    
confidence: "medium"

example:
  project: "AI + React 项目"
  decomposition:
    - pattern: "ai-llm-project"
      template: "TEMPLATE-ai-feature.md"
      
    - pattern: "frontend-project"
      template: "TEMPLATE-react-feature.md"
      
  route: "template-combination"
```

### 规则 3: 部分匹配路由

```yaml
rule_id: RT-003
name: partial-template-match
priority: 3

condition:
  all:
    - "has_some_matching_templates == true"
    - "has_unmatched_features == true"
    - "unmatched_features_significance > threshold"

action:
  route: "hybrid"
  use:
    - "matched_templates"  # 使用匹配的模板
    - "capability_reasoning"  # 使用元能力处理未匹配的部分
    
  # 混合使用
  capability_enhancement:
    - "stage-reasoning"  # 推理未匹配的部分
    - "flow-generation"  # 组合模板和推理结果
    - "knowledge-composition"  # 整合知识
    
confidence: "medium"

example:
  project: "AI Agent + 微服务 项目"
  matched:
    - pattern: "ai-llm-project"
      template: "TEMPLATE-ai-feature.md"
      
  unmatched:
    - feature: "agent-orchestration"
      # 无对应模板，使用元能力推理
      
  route: "hybrid"
```

### 规则 4: 无匹配路由

```yaml
rule_id: RT-004
name: no-template-match
priority: 4

condition:
  all:
    - "has_matching_template == false"
    - "cannot_decompose_to_known_patterns == true"
    - "project_is_sufficiently_complex"

action:
  route: "capability-driven"
  use:
    - "all_five_capabilities"  # 使用全部元能力
    
  # 完全依赖元能力
  capabilities:
    - "project-analysis"  # 分析项目
    - "stage-reasoning"  # 推理阶段
    - "knowledge-composition"  # 组合知识
    - "flow-generation"  # 生成流程
    - "learning-feedback"  # 学习反馈
    
confidence: "medium"

example:
  project: "全新类型的项目（如：区块链 + AI + VR）"
  matched_templates: []
  route: "capability-driven"
```

### 规则 5: 简单项目路由

```yaml
rule_id: RT-005
name: simple-project
priority: 5

condition:
  all:
    - "project_complexity == 'low'"
    - "has_no_special_features == true"
    - "is_standard_project == true"

action:
  route: "skeleton-only"
  use:
    - "flow-skeleton"  # 只使用流程骨架
    
  # 最简单的路由
  capabilities:
    - "flow-generation"  # 只需要生成流程
    
confidence: "high"

example:
  project: "简单脚本项目"
  complexity: "low"
  route: "skeleton-only"
```


## 与元能力的协作

capability_collaboration:
  - capability: learning-system
    relationship: feeds_into
    description: "学习系统的输出是提升的主要依据"
    data_flow:
      - "LearningRecord → 提升评估"
      - "LearningAggregation → 聚合提升"
      - "PromotionCandidate → 提升执行"
      
  - capability: knowledge-composition
    relationship: uses_output
    description: "知识组合使用提升后的最佳实践"
    data_flow:
      - "BestPractice → 组合参考"
      - "TemplateElement → 组合素材"
      - "Pattern → 模式匹配"


## 提升模板

promotion_templates:
  # 从学习记录到模式
  - id: TEMPLATE_001
    name: learning_to_pattern_template
    description: "学习记录到模式的转换模板"
    
    source_schema: learning_record
    target_schema: pattern
    
    transformations:
      - source_field: project_features
        target_field: pattern_features
        operation: aggregate
        
      - source_field: reasoning.rules_applied
        target_field: applicable_rules
        operation: extract_ids
        
      - source_field: output.stages
        target_field: recommended_stages
        operation: deduplicate
        
      - source_field: feedback.common_modifications
        target_field: common_customizations
        operation: aggregate
        
    output_template: |
      ```yaml
      pattern:
        id: PAT-{pattern_type}-{timestamp}
        name: "{pattern_name}"
        type: "{pattern_type}"
        
        features:
          # 从 learning_record.project_features 聚合
          
        stages:
          # 从 learning_record.output.stages 去重
          
        customizations:
          common: []
          optional: []
          
        statistics:
          source_records: {count}
          success_rate: {rate}
          average_satisfaction: {score}
          
        metadata:
          created_from: [LR-xxx, LR-xxx, ...]
          created_at: "{timestamp}"
      ```
      
  # 从模式到模板元素
  - id: TEMPLATE_002
    name: pattern_to_element_template
    description: "模式到模板元素的转换模板"
    
    source_schema: pattern
    target_schema: template_element
    
    transformations:
      - source_field: pattern.features
        target_field: element.context
        operation: convert_to_context
        
      - source_field: pattern.stages
        target_field: element.structure
        operation: convert_to_structure
        
      - source_field: pattern.customizations
        target_field: element.parameters
        operation: extract_parameters
        
    output_template: |
      ```yaml
      template_element:
        id: TPL-{element_type}-{timestamp}
        name: "{element_name}"
        type: "{element_type}"
        
        context:
          # 从 pattern.features 转换
          
        structure:
          # 从 pattern.stages 转换
          
        parameters:
          required: []
          optional: []
          
        usage:
          description: "{description}"
          examples: []
          
        metadata:
          derived_from: PAT-xxx
          promoted_at: "{timestamp}"
          promotion_criteria:
            usage_count: {count}
            success_rate: {rate}
      ```
      
  # 从模板元素到最佳实践
  - id: TEMPLATE_003
    name: element_to_best_practice_template
    description: "模板元素到最佳实践的转换模板"
    
    source_schema: template_element
    target_schema: best_practice
    
    transformations:
      - source_field: element.context
        target_field: practice.scenario
        operation: describe_scenario
        
      - source_field: element.structure
        target_field: practice.workflow
        operation: expand_structure
        
      - source_field: element.parameters
        target_field: practice.configurations
        operation: document_configurations
        
      - source_field: element.usage.examples
        target_field: practice.examples
        operation: copy
        
    output_template: |
      ```yaml
      best_practice:
        id: BP-{category}-{timestamp}
        name: "{practice_name}"
        category: "{category}"
        
        scenario:
          description: "{scenario_description}"
          when_to_use: []
          when_not_to_use: []
          
        workflow:
          steps: []
          gates: []
          checks: []
          
        configurations:
          parameters: []
          defaults: []
          
        examples:
          - name: "Example 1"
            description: "{description}"
            code: "{example_code}"
            
        benefits:
          - "{benefit_1}"
          - "{benefit_2}"
          
        statistics:
          source_element: TPL-xxx
          total_usages: {count}
          success_rate: {rate}
          average_satisfaction: {score}
          
        metadata:
          promoted_at: "{timestamp}"
          recommended_by: [{user_ids}]
      ```


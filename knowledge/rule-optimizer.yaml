## 优化策略

### 策略 1: 阈值调整

```yaml
strategy_id: OPT_001
strategy_name: threshold_adjustment
priority: high

trigger:
  condition: "false_positive_rate > 0.2 OR false_negative_rate > 0.1"
  
process:
  steps:
    - step: 1
      name: analyze_mismatches
      description: "分析误匹配和漏匹配的案例"
      action: |
        ```yaml
        mismatch_analysis:
          false_positives:
            - case_id: "xxx"
              features: []
              why_triggered: ""
              why_should_not: ""
              
          false_negatives:
            - case_id: "xxx"
              features: []
              why_not_triggered: ""
              why_should: ""
        ```
        
    - step: 2
      name: identify_threshold_issues
      description: "识别阈值相关的问题"
      action: |
        检查：
        - 阈值是否过于宽松（导致误触发）
        - 阈值是否过于严格（导致漏匹配）
        - 阈值是否需要分层（不同场景不同阈值）
        
    - step: 3
      name: propose_threshold_changes
      description: "提出阈值调整建议"
      action: |
        ```yaml
        threshold_changes:
          current:
            confidence_threshold: 0.7
            
          proposed:
            confidence_threshold: 0.75  # 更严格，减少误触发
            
          expected_impact:
            false_positive_reduction: 0.3
            false_negative_increase: 0.05
        ```
        
    - step: 4
      name: validate_changes
      description: "在历史数据上验证调整效果"
      action: |
        使用历史案例验证：
        - 回测调整后的规则
        - 比较调整前后的指标
        - 确认改进效果
        
    - step: 5
      name: apply_changes
      description: "应用调整"
      condition: "validation_passed"
      action: |
        更新规则定义
        记录调整历史
        通知相关人员

# 阈值调整规则
threshold_adjustment_rules:
  - id: TA_RULE_001
    name: reduce_false_positives
    condition: "false_positive_rate > 0.2"
    action: "increase_threshold_by_0.05"
    
  - id: TA_RULE_002
    name: reduce_false_negatives
    condition: "false_negative_rate > 0.1"
    action: "decrease_threshold_by_0.05"
    
  - id: TA_RULE_003
    name: balance_accuracy_coverage
    condition: "both_metrics_suboptimal"
    action: "analyze_case_by_case_and_adjust"
    
  - id: TA_RULE_004
    name: context_based_threshold
    condition: "different_contexts_need_different_thresholds"
    action: "implement_context_specific_thresholds"
```

### 策略 2: 条件优化

```yaml
strategy_id: OPT_002
strategy_name: condition_optimization
priority: medium

trigger:
  condition: "false_positive_rate > 0.15 AND threshold_adjustment_ineffective"
  
process:
  steps:
    - step: 1
      name: analyze_false_positives
      description: "深入分析误触发案例"
      action: |
        对每个误触发案例：
        - 提取项目特征
        - 分析为什么触发了规则
        - 识别共同的"误触发"模式
        
    - step: 2
      name: identify_condition_gaps
      description: "识别条件的不足"
      action: |
        检查：
        - 是否缺少必要的排除条件
        - 是否需要更精确的匹配条件
        - 是否需要额外的上下文条件
        
    - step: 3
      name: propose_condition_changes
      description: "提出条件优化建议"
      action: |
        ```yaml
        condition_changes:
          current:
            trigger: "项目涉及 AI/LLM 技术"
            
          proposed:
            trigger: "项目涉及 AI/LLM 技术 AND NOT 纯研究项目"
            
          added_exclusions:
            - "research_project"
            - "academic_paper"
            
          expected_impact:
            false_positive_reduction: 0.4
        ```
        
    - step: 4
      name: validate_with_cases
      description: "用历史案例验证"
      action: |
        - 回测所有历史案例
        - 确认误触发减少
        - 确认不会增加漏匹配
        
    - step: 5
      name: apply_and_monitor
      description: "应用并监控"
      action: |
        更新规则
        设置监控期（1 周）
        跟踪改进效果

# 条件优化类型
condition_optimization_types:
  - type: add_exclusion
    description: "添加排除条件"
    example: "NOT 纯前端项目"
    
  - type: add_requirement
    description: "添加必要条件"
    example: "AND 有 API 调用"
    
  - type: refine_pattern
    description: "精细化匹配模式"
    example: "从 '有 AI' 改为 '使用 OpenAI API'"
    
  - type: add_context
    description: "添加上下文条件"
    example: "AND 项目规模 > medium"
```

### 策略 3: 权重调整

```yaml
strategy_id: OPT_003
strategy_name: weight_optimization
priority: medium

trigger:
  condition: "multiple_rules_trigger_and_need_priority"
  
process:
  steps:
    - step: 1
      name: identify_weighting_issues
      description: "识别权重相关问题"
      action: |
        当多个规则同时触发时：
        - 当前权重是否合理
        - 高权重规则是否真的更重要
        - 权重是否需要动态调整
        
    - step: 2
      name: analyze_co_trigger_patterns
      description: "分析规则共触发模式"
      action: |
        ```yaml
        co_trigger_analysis:
          rule_pairs:
            - rules: ["R006", "R007"]
              co_trigger_rate: 0.6
              which_should_win: "R006"
              current_winner: "R006"
              
            - rules: ["R004", "R006"]
              co_trigger_rate: 0.3
              which_should_win: "R004"
              current_winner: "R006"  # 问题！
        ```
        
    - step: 3
      name: propose_weight_changes
      description: "提出权重调整建议"
      action: |
        基于共触发分析：
        - 调整规则权重
        - 或调整权重计算公式
        
    - step: 4
      name: simulate_and_validate
      description: "模拟验证"
      action: |
        在历史数据上模拟：
        - 应用新的权重
        - 检查决策变化
        - 评估整体效果
        
    - step: 5
      name: apply_gradually
      description: "渐进式应用"
      action: |
        - 先在低风险场景应用
        - 逐步扩大应用范围
        - 持续监控效果

# 权重优化方法
weight_optimization_methods:
  - method: static_adjustment
    description: "静态调整规则权重值"
    example: "R006.weight: 0.8 → 0.7"
    
  - method: dynamic_weighting
    description: "基于上下文动态计算权重"
    example: "weight = base_weight * context_factor"
    
  - method: learned_weights
    description: "从历史数据学习最优权重"
    example: "使用机器学习优化权重"
```

### 策略 4: 规则合并/拆分

```yaml
strategy_id: OPT_004
strategy_name: rule_merge_split
priority: low

trigger:
  condition: "rules_highly_correlated OR rule_too_broad"
  
process:
  steps:
    - step: 1
      name: detect_merge_split_candidates
      description: "检测合并/拆分候选"
      action: |
        合并候选：
        - 两个规则总是同时触发
        - 两个规则的后续阶段高度重叠
        
        拆分候选：
        - 一个规则的触发案例差异很大
        - 一个规则需要不同的后续处理
        
    - step: 2
      name: analyze_impact
      description: "分析合并/拆分的影响"
      action: |
        ```yaml
        merge_analysis:
          candidates: ["R006", "R007"]
          
          current:
            R006_triggers: 45
            R007_triggers: 38
            co_trigger: 35
            
          proposed_merge:
            combined_triggers: 48  # 去重后
            
          impact:
            reduction_in_rules: 1
            coverage_change: "neutral"
            complexity_reduction: "high"
        ```
        
    - step: 3
      name: design_new_rule
      description: "设计新的规则"
      action: |
        合并时：
        - 合并触发条件
        - 合并后续阶段
        - 选择较高的置信度
        
        拆分时：
        - 识别不同的子模式
        - 为每个子模式创建规则
        - 确保无重叠
        
    - step: 4
      name: validate_extensively
      description: "广泛验证"
      action: |
        - 回测所有历史案例
        - 检查是否有遗漏
        - 检查是否有冲突
        
    - step: 5
      name: migrate_and_monitor
      description: "迁移并监控"
      action: |
        - 更新规则定义
        - 迁移历史学习记录
        - 密切监控初期效果

# 合并/拆分规则
merge_split_rules:
  - id: MS_RULE_001
    name: high_correlation_merge
    condition: "co_trigger_rate > 0.8 AND stage_overlap > 0.7"
    action: "merge_rules"
    
  - id: MS_RULE_002
    name: low_diversity_split
    condition: "rule_triggers_high_diversity AND different_optimal_actions"
    action: "split_rule"
    
  - id: MS_RULE_003
    name: maintain_hierarchical_structure
    condition: "merge_would_create_cycle"
    action: "do_not_merge"
```


## 优化流程

### 自动优化流程

```yaml
automatic_optimization_flow:
  name: continuous_optimization
  description: "持续自动优化流程"
  
  schedule:
    - trigger: "daily"
      time: "02:00"  # 凌晨低峰期
      scope: "all_rules"
      
    - trigger: "weekly"
      time: "Monday 10:00"
      scope: "rules_with_issues"
      
    - trigger: "threshold_breached"
      scope: "affected_rule"
  
  steps:
    - step: 1
      id: AO_STEP_001
      name: collect_performance_data
      description: "收集所有规则的性能数据"
      action: |
        ```yaml
        data_collection:
          period: "last_7_days"
          metrics: ["PM_001" to "PM_010"]
          output: "rule_performance_reports/"
        ```
        
    - step: 2
      id: AO_STEP_002
      name: evaluate_rule_health
      description: "评估每个规则的健康状态"
      action: |
        对每个规则计算健康分数：
        ```yaml
        health_score = (
          accuracy_score * 0.3 +
          effectiveness_score * 0.3 +
          coverage_score * 0.2 +
          efficiency_score * 0.2
        )
        ```
        
    - step: 3
      id: AO_STEP_003
      name: identify_issues
      description: "识别需要优化的规则"
      action: |
        ```yaml
        issue_detection:
          thresholds:
            health_score_below: 70
            false_positive_above: 0.2
            false_negative_above: 0.1
            success_rate_below: 0.8
            
          output: "rules_needing_optimization"
        ```
        
    - step: 4
      id: AO_STEP_004
      name: generate_optimization_proposals
      description: "生成优化提案"
      action: |
        对每个有问题的规则：
        - 分析问题原因
        - 选择优化策略
        - 生成具体提案
        
    - step: 5
      id: AO_STEP_005
      name: validate_proposals
      description: "验证优化提案"
      action: |
        - 回测历史数据
        - 模拟效果
        - 生成验证报告
        
    - step: 6
      id: AO_STEP_006
      name: apply_or_flag
      description: "应用或标记需要人工审核"
      action: |
        ```yaml
        decision:
          auto_apply:
            - "threshold_adjustment with high confidence"
            - "minor condition refinement"
            
          flag_for_review:
            - "major structural changes"
            - "rule merge/split"
            - "low confidence proposals"
        ```
        
    - step: 7
      id: AO_STEP_007
      name: monitor_changes
      description: "监控应用后的效果"
      action: |
        设置监控期（7 天）
        跟踪改进效果
        如效果不佳，回滚
```

### 人工审核流程

```yaml
human_review_flow:
  name: human_in_the_loop
  description: "需要人工审核的优化流程"
  
  triggers:
    - "major_rule_changes"
    - "rule_merge_or_split"
    - "low_confidence_optimization"
    - "admin_requested_review"
  
  steps:
    - step: 1
      name: generate_review_request
      description: "生成审核请求"
      action: |
        ```yaml
        review_request:
          id: "RR-2026-06-22-001"
          created_at: "2026-06-22T10:00:00Z"
          rule_id: "R006"
          optimization_type: "merge_with_R007"
          
          current_state:
            # 规则当前状态
            
          proposed_change:
            # 建议的变更
            
          analysis:
            # 分析依据
            
          risk_assessment:
            # 风险评估
            
          recommended_action: "approve"
        ```
        
    - step: 2
      name: notify_stakeholders
      description: "通知相关人员"
      action: |
        - 发送审核请求
        - 附上分析报告
        - 设置审核期限
        
    - step: 3
      name: wait_for_decision
      description: "等待审核决定"
      timeout: "72h"
      
    - step: 4
      name: apply_decision
      description: "应用决定"
      action: |
        ```yaml
        decision:
          status: "approved | rejected | modified"
          reviewed_by: "admin-001"
          reviewed_at: "2026-06-23T14:00:00Z"
          comments: ""
          
          if approved:
            - apply_optimization
            - notify_system
            
          if rejected:
            - discard_proposal
            - log_rejection_reason
            
          if modified:
            - apply_modifications
            - revalidate
        ```
```


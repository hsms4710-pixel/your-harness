      - balanced: "平衡，适度检查"
      - aggressive: "激进，减少检查提高效率"
      
  - id: PD_005
    name: documentation_preference
    description: "文档偏好"
    options:
      - minimal: "最少文档"
      - essential: "必要文档"
      - comprehensive: "完整文档"
      - exhaustive: "详尽文档"
      
  - id: PD_006
    name: coding_style

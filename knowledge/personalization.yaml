## 个性化适配

### 适配规则

```yaml
adaptation_rules:
  - id: ADAPT_001
    name: detail_level_adaptation
    description: "根据详细程度偏好调整生成内容"
    
    mappings:
      minimal:
        checks: "only_critical"
        explanations: "none"
        examples: "none"
        alternatives: "none"
        
      standard:
        checks: "important"
        explanations: "brief"
        examples: "key_examples"
        alternatives: "recommended"
        
      detailed:
        checks: "all"
        explanations: "detailed"
        examples: "comprehensive"
        alternatives: "all"
        
      exhaustive:
        checks: "all_with_variants"
        explanations: "exhaustive"
        examples: "all_possible"
        alternatives: "all_with_pros_cons"
  
  - id: ADAPT_002
    name: guidance_style_adaptation
    description: "根据指导风格偏好调整指令措辞"
    
    mappings:
      directive:
        language: "imperative"
        examples: ["执行 X 操作", "运行 Y 命令", "检查 Z 文件"]
        tone: "direct"
        
      suggestive:
        language: "recommendatory"
        examples: ["建议执行 X 操作", "可以考虑运行 Y 命令", "建议检查 Z 文件"]
        tone: "friendly"
        
      exploratory:
        language: "questioning"
        examples: ["您考虑过 X 吗？", "Y 可能有帮助吗？", "Z 的影响是什么？"]
        tone: "curious"
        
      adaptive:
        language: "context_based"
        examples: "根据情况调整"
        tone: "flexible"
  
  - id: ADAPT_003
    name: automation_level_adaptation
    description: "根据自动化程度偏好调整确认点"
    
    mappings:
      manual:
        checkpoints: "all"
        auto_proceed: false
        skip_allowed: false
        
      semi_auto:
        checkpoints: "key_decisions"
        auto_proceed: true
        skip_allowed: true
        
      auto:
        checkpoints: "exceptions_only"
        auto_proceed: true
        skip_allowed: true
        notify: true
        
      full_auto:
        checkpoints: "none"
        auto_proceed: true
        skip_allowed: true
        notify: "after_completion"
  
  - id: ADAPT_004
    name: risk_tolerance_adaptation
    description: "根据风险容忍度调整检查严格度"
    
    mappings:
      conservative:
        gate_strictness: "very_strict"
        required_checks: "all"
        confirmation_frequency: "high"
        warnings_threshold: "low"
        
      balanced:
        gate_strictness: "standard"
        required_checks: "important"
        confirmation_frequency: "medium"
        warnings_threshold: "medium"
        
      aggressive:
        gate_strictness: "relaxed"
        required_checks: "critical"
        confirmation_frequency: "low"
        warnings_threshold: "high"
```

### 适配应用

```yaml
adaptation_application:
  name: apply_personalization
  description: "将用户偏好应用到生成过程中"
  
  application_points:
    # 1. 路由阶段
    routing_adaptation:
      - "根据用户偏好调整路由决策"
      - "如果用户偏好详细，更倾向于 hybrid 模式"
      - "如果用户偏好快速，更倾向于 skeleton-only 模式"
      
    # 2. 组合阶段
    combination_adaptation:
      - "根据详细程度选择包含的元素"
      - "根据指导风格调整元素的措辞"
      - "根据自动化程度调整闸门设置"
      
    # 3. 生成阶段
    generation_adaptation:
      - "根据详细程度调整生成的详细度"
      - "根据文档偏好调整文档数量"
      - "根据代码风格调整示例代码"
      
    # 4. 输出阶段
    output_adaptation:
      - "根据详细程度调整输出格式"
      - "根据指导风格调整说明方式"
      - "根据用户习惯调整命令格式"
  
  adaptation_flow:
    ```yaml
    1. 获取用户画像
       user_profile = get_user_profile(user_id)
       
    2. 获取项目上下文
       project_context = analyze_project(project_path)
       
    3. 检查项目特定偏好
       if project_context.type in user_profile.project_specific:
           preferences = user_profile.project_specific[project_context.type]
       else:
           preferences = user_profile.inferred_preferences
           
    4. 应用适配规则
       adapted_generation = apply_adaptation_rules(
           base_generation,
           preferences
       )
       
    5. 生成个性化输出
       personalized_output = generate_output(adapted_generation)
    ```
```


# 个性化适配器
# 版本: 1.0.0
# 创建日期: 2026-06-22

---

schema:
  name: personalization_adapter
  version: "1.0"
  description: "定义基于用户偏好的个性化适配机制"

---

## 概述

个性化适配器让 Your Harness 能够根据用户的历史使用习惯、偏好设置和项目特点，提供个性化的生成结果。

### 核心理念

```
通用生成: 适合大多数人的平均需求
个性化生成: 适合这个特定用户的特定需求

个性化 = 基础生成 + 用户偏好 + 项目上下文
```

### 个性化维度

```yaml
personalization_dimensions:
  - id: PD_001
    name: detail_level
    description: "详细程度偏好"
    options:
      - minimal: "极简，只显示必要信息"
      - standard: "标准，平衡详细和简洁"
      - detailed: "详细，包含所有可能的检查项"
      - exhaustive: "详尽，包含所有细节和解释"
    
  - id: PD_002
    name: guidance_style
    description: "指导风格偏好"
    options:
      - directive: "指令式，直接告诉该做什么"
      - suggestive: "建议式，提供选项和推荐"
      - exploratory: "探索式，引导思考和讨论"
      - adaptive: "自适应，根据情况调整"
      
  - id: PD_003
    name: automation_level
    description: "自动化程度偏好"
    options:
      - manual: "手动，需要逐步确认"
      - semi_auto: "半自动，关键节点确认"
      - auto: "自动，仅在异常时确认"
      - full_auto: "全自动，事后汇报"
      
  - id: PD_004
    name: risk_tolerance

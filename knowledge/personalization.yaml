## 偏好设置

### 显式设置界面

```yaml
explicit_settings_ui:
  name: user_preferences_settings
  description: "用户显式设置偏好的界面"
  
  settings_categories:
    - category: general
      name: "通用设置"
      preferences:
        - detail_level
        - guidance_style
        - automation_level
        
    - category: quality
      name: "质量设置"
      preferences:
        - risk_tolerance
        - documentation_preference
        
    - category: project_types
      name: "项目类型设置"
      preferences:
        - "AI/LLM 项目偏好"
        - "Web 前端项目偏好"
        - "后端 API 项目偏好"
        - "其他项目类型偏好"
        
    - category: advanced
      name: "高级设置"
      preferences:
        - coding_style
        - custom_rules
        - ignored_suggestions
  
  setting_ui_elements:
    - element: slider
      description: "用于连续偏好（如详细程度）"
      example: "详细程度: [----●----] 简洁 ← → 详尽"
      
    - element: radio_group
      description: "用于离散偏好（如指导风格）"
      example: "指导风格: (●) 指令式  ( ) 建议式  ( ) 探索式"
      
    - element: checkbox
      description: "用于启用/禁用功能"
      example: "[✓] 自动应用学习的偏好"
      
    - element: custom_input
      description: "用于自定义设置"
      example: "自定义检查项: [________]"
```


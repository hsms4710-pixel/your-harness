## 用户画像

### 用户画像结构

```yaml
user_profile:
  id: "UP-001"
  user_id: "user-12345"
  created_at: "2026-06-01T10:00:00Z"
  last_updated: "2026-06-22T15:00:00Z"
  
  # 显式偏好（用户主动设置）
  explicit_preferences:
    detail_level: "detailed"
    guidance_style: "suggestive"
    risk_tolerance: "balanced"
    
  # 推断偏好（从行为推断）
  inferred_preferences:
    automation_level: "semi_auto"
    documentation_preference: "essential"
    coding_style: "follow_team"
    
  # 推断依据
  inference_basis:
    - source: "modification_patterns"
      description: "用户倾向于保留详细的检查项"
      confidence: 0.85
      
    - source: "skip_patterns"
      description: "用户经常跳过自动生成文档的步骤"
      confidence: 0.78
      
    - source: "time_spent"
      description: "用户在确认节点花费较少时间"
      confidence: 0.72
  
  # 使用统计
  usage_statistics:
    total_sessions: 45
    total_generations: 67
    average_satisfaction: 4.2
    common_modifications:
      - modification: "add_more_checks"
        frequency: 0.35
        
      - modification: "skip_documentation"
        frequency: 0.28
        
      - modification: "increase_detail"
        frequency: 0.22
    
  # 项目偏好（按项目类型）
  project_specific_preferences:
    ai_agent:
      detail_level: "exhaustive"
      automation_level: "manual"
      
    web_frontend:
      detail_level: "standard"
      automation_level: "auto"
      
    backend_api:
      detail_level: "detailed"
      automation_level: "semi_auto"
```


## 团队偏好

### 团队偏好结构

```yaml
team_preferences:
  id: "TP-001"
  team_id: "team-ai-research"
  created_at: "2026-06-01T10:00:00Z"
  last_updated: "2026-06-22T15:00:00Z"
  
  # 团队级别设置（覆盖个人设置）
  team_overrides:
    coding_style: "custom"
    custom_style_rules:
      - "使用 type hints"
      - "函数不超过 50 行"
      - "使用 dataclass 而非 dict"
      
  documentation_preference: "comprehensive"
  
  # 团队标准流程
  team_standard_flows:
    ai_feature:
      template: "TEMPLATE-ai-feature-team.md"
      required_checks: ["cost_analysis", "safety_review", "performance_test"]
      
    bug_fix:
      template: "TEMPLATE-bugfix-team.md"
      required_checks: ["root_cause_analysis", "regression_test"]
      
  # 成员偏好汇总
  member_preferences_summary:
    total_members: 12
    consensus_preferences:
      detail_level: "detailed"  # 80% 成员选择
      guidance_style: "suggestive"  # 75% 成员选择
      automation_level: "semi_auto"  # 90% 成员选择
      
    divergent_preferences:
      - preference: "risk_tolerance"
        distribution:
          conservative: 40%
          balanced: 50%
          aggressive: 10%
        recommendation: "保持个人偏好"
```


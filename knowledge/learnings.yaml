improvements:
  # ----------------------------------------------------------
  # 用户反馈
  # ----------------------------------------------------------
  
  - id: I001
    category: template
    date: 2026-06-18
    source: user-feedback
    suggestion: |
      希望 Template 能够包含更多的实际命令示例
      而不是只有模板变量
    priority: medium
    status: pending
    notes: |
      可以在元模板中添加多个示例块
      根据项目特征选择最合适的示例
  
  - id: I002
    category: script
    date: 2026-06-18
    source: user-feedback
    suggestion: |
      希望脚本能够支持并行执行
      对于多个检查项，可以并行执行提高效率

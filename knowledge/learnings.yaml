    status: pending
    notes: |
      可以使用 Python 的 concurrent.futures
      或者 subprocess 并行执行
  
  - id: I003
    category: knowledge-base
    date: 2026-06-18
    source: user-feedback
    suggestion: |
      希望能够自定义项目模式
      对于特殊的项目类型，可以添加自定义模式
    priority: medium
    status: pending
    notes: |
      可以支持用户在项目中定义自定义模式
      覆盖或扩展默认的项目模式

# ============================================================
# 特定项目类型规则
# 从特定项目类型中学习的特殊处理规则
# ============================================================

project_type_rules:
  # ----------------------------------------------------------
  # AI/LLM 项目
  # ----------------------------------------------------------
  
  ai-llm:
    - rule: API Key 必须使用环境变量或密钥管理服务
      severity: critical
      check: check_api_key_management
      
    - rule: Prompt 变更需要审核
      severity: high
      check: check_prompt_safety
      
    - rule: 需要成本估算
      severity: medium
      check: check_cost_estimation
      
    - rule: 输出需要过滤敏感信息
      severity: high
      check: check_output_filtering
  
  # ----------------------------------------------------------
  # 微服务项目
  # ----------------------------------------------------------
  
  microservice:
    - rule: 需要健康检查端点
      severity: critical
      check: check_health_endpoint
      
    - rule: 需要 API 版本管理
      severity: high
      check: check_api_versioning
      
    - rule: 需要服务发现配置
      severity: high
      check: check_service_discovery
      
    - rule: 需要负载均衡配置
      severity: medium
      check: check_load_balancer
  
  # ----------------------------------------------------------
  # Monorepo 项目
  # ----------------------------------------------------------
  
  monorepo:
    - rule: 需要依赖检查
      severity: critical
      check: check_circular_dependencies
      
    - rule: 需要增量构建
      severity: high
      check: check_incremental_build
      
    - rule: 需要包版本管理
      severity: high
      check: check_package_versions
      
    - rule: 需要构建缓存
      severity: medium
      check: check_build_cache
  
  # ----------------------------------------------------------
  # 前端项目
  # ----------------------------------------------------------
  
  frontend:
    - rule: 需要构建优化
      severity: high
      check: check_build_optimization
      
    - rule: 需要性能监控
      severity: medium
      check: check_performance_monitoring
      
    - rule: 需要无障碍检查
      severity: medium
      check: check_accessibility
      
    - rule: 需要浏览器兼容性
      severity: medium
      check: check_browser_compatibility


# 知识积累库
# 存储从历史生成中学习到的规则和改进建议
#
# 本文件用于：
# 1. 记录生成过程中发现的问题
# 2. 存储用户反馈的改进建议
# 3. 记录特定项目类型的特殊处理规则
# 4. 持续改进生成质量
#
# 更新时间: 2026-06-22

version: 1.0.0

# ============================================================
# 学习记录
# 从历史生成中学习到的规则
# ============================================================

learnings:
  # ----------------------------------------------------------
  # 模板生成相关
  # ----------------------------------------------------------
  
  - id: L001
    category: template
    date: 2026-06-18
    source: smartmate-test
    learning: |
      元模板不应该硬编码特定项目的路径或文件名
      应该使用抽象变量，由 harness-archaeology 在扫描时填充
    rule: |
      元模板中的变量应该：
      - 使用通用名称（如 {{service_name}}, {{feature_name}}）
      - 不包含特定项目的路径（如 dbproxy/, cgi/）
      - 不包含特定的 API 名称（如云 API）
    priority: high
    status: applied
    applied_version: 4.4.0
  
  - id: L002
    category: template
    date: 2026-06-18
    source: smartmate-test
    learning: |
      Template 的 Step/Run/Expected 部分应该足够详细
      包含具体的命令和预期输出，而不是 TODO 占位符
    rule: |
      元模板的每个 Step 应该包含：
      - Input: 明确的输入列表
      - Process: 详细的处理步骤
      - Output: 明确的输出列表
      - Run: 具体的命令（使用变量填充）
      - Expected: 具体的预期输出
    priority: high
    status: applied
    applied_version: 4.3.0
  
  - id: L003
    category: template
    date: 2026-06-18
    source: smartmate-test
    learning: |
      工具集成（如 MCP）应该通过知识库配置，而不是硬编码
      根据项目特征自动选择适用的工具
    rule: |
      工具集成知识库应该：
      - 定义多种工具的检测规则
      - 定义工具的使用方式
      - 根据项目特征自动选择
      - 支持多种代码托管平台
    priority: high
    status: applied
    applied_version: 4.3.0
  
  # ----------------------------------------------------------
  # 知识库相关
  # ----------------------------------------------------------
  
  - id: L004
    category: knowledge-base
    date: 2026-06-18
    source: github-top100-analysis
    learning: |
      项目模式知识库需要覆盖 GitHub Top 100 项目的主要类型
      AI/LLM 项目占比 30%，是增长最快的方向
    rule: |
      项目模式知识库应该包含：
      - AI/LLM 项目模式（agent-framework, ai-sdk, ai-application）
      - 前端项目模式（static-website, web-app, component-library）
      - 开发工具模式（cli-tool, dev-infra, learning-resource）
      - 微服务架构模式
      - Monorepo 模式
    priority: high
    status: applied
    applied_version: 4.5.0
  
  - id: L005
    category: knowledge-base
    date: 2026-06-18
    source: github-top100-analysis
    learning: |
      TypeScript 是 GitHub Top 100 中最受欢迎的语言（25%）
      Python（20%）主要用于 AI/ML 项目
    rule: |
      语言检测应该支持：
      - TypeScript/JavaScript（前端、AI Agent 框架）
      - Python（AI/ML、自动化）
      - Go（基础设施、CLI 工具）
      - Rust（系统编程、AI 框架）
      - Java（企业应用）
    priority: medium
    status: applied
    applied_version: 4.5.0
  
  # ----------------------------------------------------------
  # 脚本生成相关
  # ----------------------------------------------------------
  
  - id: L006
    category: script
    date: 2026-06-18
    source: smartmate-test
    learning: |
      脚本模板应该有完整的实现，而不是只有框架和注释
      需要根据项目特征填充具体的实现
    rule: |
      脚本模板应该包含：
      - 完整的功能实现
      - 错误处理
      - 命令行参数支持
      - 输出格式化
      - 使用变量填充项目特定内容
    priority: high
    status: applied
    applied_version: 4.3.0
  
  - id: L007
    category: script
    date: 2026-06-18
    source: smartmate-test
    learning: |
      检查脚本应该支持多种输出格式（JSON、文本）
      便于与其他工具集成
    rule: |
      检查脚本应该支持：
      - --json 参数输出 JSON 格式
      - 默认输出人类可读的文本格式
      - 退出码表示检查结果
    priority: medium
    status: applied
    applied_version: 4.3.0
  
  # ----------------------------------------------------------
  # 通用性相关
  # ----------------------------------------------------------
  
  - id: L008
    category: general
    date: 2026-06-18
    source: smartmate-test
    learning: |
      Your Harness 应该是通用的开发流程生成器
      不针对特定项目，所有项目特定内容通过变量填充
    rule: |
      设计原则：
      1. 通用性: 模式、模板、脚本应该是通用的
      2. 可配置: 通过变量和配置支持项目特定内容
      3. 可扩展: 支持添加新的模式和模板
      4. 可学习: 从用户反馈中持续改进
    priority: critical
    status: applied
    applied_version: 4.4.0
  
  - id: L009
    category: general
    date: 2026-06-18
    source: smartmate-test
    learning: |
      知识库应该支持多种代码托管平台和 CI/CD 系统
      不只是工蜂，还要支持 GitHub、GitLab 等
    rule: |
      工具集成知识库应该支持：
      - 代码托管: GitHub, GitLab, 工蜂, Bitbucket
      - CI/CD: GitHub Actions, GitLab CI, Jenkins, Travis CI
      - 容器: Docker, Kubernetes
      - 云平台: AWS, GCP, Azure, 腾讯云
    priority: high
    status: applied
    applied_version: 4.4.0


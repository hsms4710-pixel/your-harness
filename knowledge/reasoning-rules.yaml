# ============================================================
# 元规则
# ============================================================

meta_rules:
  # 规则优先级
  priority:
    description: "当多个规则都匹配时，按此优先级排序"
    order:
      - "security-sensitive"  # 安全永远第一
      - "ai-llm-integration"  # AI 项目特殊处理
      - "performance-requirements"  # 性能要求
      - "microservice-architecture"  # 微服务架构
      - "data-intensive"  # 数据密集型
      - "real-time-requirements"  # 实时性要求
      - "protocol-driven"  # 协议驱动
      - "external-integration"  # 外部集成
      - "data-processing"  # 数据处理
      - "user-interaction"  # 用户交互
      
  # 阶段合并规则
  stage_merge:
    description: "当多个规则产生相同阶段时，合并为一个"
    merge_strategy: "union"
    
  # 冲突解决规则
  conflict_resolution:
    - condition: "一个规则要求安全检查，另一个不要求"
      resolution: "保留安全检查"
      
    - condition: "两个规则对同一阶段有不同 focus"
      resolution: "合并 focus"
      
    - condition: "冲突无法自动解决"
      resolution: "提交给用户确认"
      
  # 默认阶段
  default_stages:
    description: "所有项目都包含的基础阶段"
    stages:
      - id: REQUIREMENT_UNDERSTANDING
        name: "需求理解"
        
      - id: IMPLEMENTATION
        name: "实现"
        
      - id: VERIFICATION
        name: "验证"
        
  # 阶段重要性阈值
  importance_thresholds:
    critical: ">= 0.8"  # 必须包含
    high: ">= 0.6"  # 建议包含
    medium: ">= 0.4"  # 可选
    low: "< 0.4"  # 不包含

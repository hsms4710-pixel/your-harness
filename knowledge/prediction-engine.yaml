## 预测建议生成

### 建议类型

```yaml
suggestion_types:
  - id: ST_001
    name: action_suggestion
    description: "建议执行的操作"
    example: "建议进行 API 安全性审查"
    
  - id: ST_002
    name: element_suggestion
    description: "建议添加的元素"
    example: "建议添加成本估算检查项"
    
  - id: ST_003
    name: timing_suggestion
    description: "建议的时机"
    example: "建议在部署前 1 天完成测试"
    
  - id: ST_004
    name: resource_suggestion
    description: "建议的资源"
    example: "建议准备备用 API 密钥"
    
  - id: ST_005
    name: risk_suggestion
    description: "建议的风险处理"
    example: "建议增加回滚方案"
    
  - id: ST_006
    name: optimization_suggestion
    description: "建议的优化"
    example: "建议合并这两个相似步骤"
```

### 建议生成规则

```yaml
suggestion_generation:
  name: generate_suggestions
  description: "基于预测生成具体建议"
  
  # 建议模板
  suggestion_templates:
    - template: "ACTION_RECOMMENDATION"
      format: "建议您进行 {action}，因为 {reason}。"
      example: "建议您进行 API 安全性审查，因为该 API 处理敏感用户数据。"
      
    - template: "MISSING_ELEMENT"
      format: "{project_type} 项目通常需要 {element}，当前流程中缺少此步骤。"
      example: "AI/LLM 项目通常需要成本估算步骤，当前流程中缺少此步骤。"
      
    - template: "RISK_WARNING"
      format: "注意：{risk_description}。建议 {mitigation}。"
      example: "注意：当前变更可能影响支付模块。建议在测试环境先验证。"
      
    - template: "BEST_PRACTICE"
      format: "根据最佳实践，建议 {practice}。这样可以 {benefit}。"
      example: "根据最佳实践，建议在部署前进行性能基准测试。这样可以确保生产环境性能。"
      
    - template: "EFFICIENCY_TIP"
      format: "提示：{tip}，可以节省约 {time_saved}。"
      example: "提示：可以将代码审查和测试合并进行，可以节省约 30 分钟。"
  
  # 建议优先级
  priority_rules:
    - id: "PRIO_001"
      name: security_related
      condition: "suggestion involves security"
      priority: "critical"
      
    - id: "PRIO_002"
      name: cost_related
      condition: "suggestion involves cost"
      priority: "high"
      
    - id: "PRIO_003"
      name: risk_related
      condition: "suggestion involves risk mitigation"
      priority: "high"
      
    - id: "PRIO_004"
      name: best_practice
      condition: "suggestion is best practice recommendation"
      priority: "medium"
      
    - id: "PRIO_005"
      name: efficiency
      condition: "suggestion is efficiency tip"
      priority: "low"
  
  # 建议生成流程
  generation_flow:
    ```yaml
    1. 获取预测结果
       predictions = get_predictions(context)
       
    2. 为每个预测生成建议
       for prediction in predictions:
           suggestion = generate_suggestion(prediction)
           
    3. 计算建议优先级
           suggestion.priority = calculate_priority(suggestion)
           
    4. 应用个性化适配
           suggestion = adapt_to_user(suggestion, user_profile)
           
    5. 排序并限制数量
           suggestions = sort_by_priority(suggestions)[:5]
           
    6. 生成最终输出
           output = format_suggestions(suggestions)
    ```
```


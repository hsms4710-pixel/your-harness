# GitHub Top 100 项目特征分析
# 数据来源: GitHub Ranking 2025-2026
# 生成时间: 2026-06-18

## 一、语言分布

language_distribution:
  # 主要语言（按项目数量排序）
  top_languages:
    - language: TypeScript
      count: 25
      percentage: 25%
      description: |
        主要用于前端框架、AI Agent 平台、自动化工具
        代表项目: freeCodeCamp, vscode, n8n, react, vue
        
    - language: Python
      count: 20
      percentage: 20%
      description: |
        主要用于 AI/ML、数据科学、自动化脚本
        代表项目: tensorflow, transformers, AutoGPT, stable-diffusion-webui
        
    - language: JavaScript
      count: 15
      percentage: 15%
      description: |
        主要用于前端应用、浏览器工具
        代表项目: react, vue, bootstrap, axios
        
    - language: Go
      count: 8
      percentage: 8%
      description: |
        主要用于基础设施、安全工具、高性能服务
        代表项目: trivy, rust (部分), docker 相关
        
    - language: Rust
      count: 7
      percentage: 7%
      description: |
        主要用于系统工具、编辑器、高性能应用
        代表项目: deno, rustdesk, zed, lapce
        
    - language: Java
      count: 6
      percentage: 6%
      description: |
        主要用于企业应用、Android 开发
        代表项目: godot (C++), spring 相关
        
    - language: C/C++
      count: 5
      percentage: 5%
      description: |
        主要用于系统软件、内核、游戏引擎
        代表项目: linux, godot
        
    - language: Markdown/HTML
      count: 14
      percentage: 14%
      description: |
        主要是文档类项目（学习资源、教程）
        代表项目: build-your-own-x, awesome, system-design-primer
        
  # 语言特征映射
  language_features:
    TypeScript:
      common_frameworks:
        - React
        - Vue
        - Next.js
        - Angular
        - Nuxt.js
      common_tools:
        - Vite
        - Webpack
        - Turborepo
        - Vitest
        - Playwright
      typical_projects:
        - 前端应用
        - 全栈应用
        - AI Agent 平台
        - IDE/编辑器
        - 自动化工具
        
    Python:
      common_frameworks:
        - Django
        - FastAPI
        - Flask
        - LangChain
        - PyTorch
        - TensorFlow
      common_tools:
        - pytest
        - black
        - ruff
        - mypy
        - uv/pip
      typical_projects:
        - AI/ML 应用
        - 数据分析
        - Web 后端
        - 自动化脚本
        - 科学计算
        
    Go:
      common_frameworks:
        - Gin
        - Echo
        - Fiber
        - gRPC
      common_tools:
        - go test
        - golangci-lint
        - wire (DI)
        - buf (gRPC)
      typical_projects:
        - 微服务
        - 基础设施工具
        - 安全扫描
        - 高性能服务
        
    Rust:
      common_frameworks:
        - Actix
        - Axum
        - Rocket
      common_tools:
        - cargo test
        - clippy
        - rustfmt
      typical_projects:

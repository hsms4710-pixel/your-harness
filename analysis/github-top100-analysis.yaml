    3: "AI/LLM 相关项目占比 30%，是增长最快的方向"
    4: "前后端分离架构是最常见的模式（40%）"
    5: "GitHub Actions 是主流 CI/CD 选择（80%）"
    6: "Monorepo 模式在大型项目中很常见（25%）"
    
  recommendations_for_your_harness:

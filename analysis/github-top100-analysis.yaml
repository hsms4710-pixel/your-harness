## 二、项目类型分布

project_type_distribution:
  # 按项目类型分类
  types:
    # 1. AI/LLM 相关
    ai_llm:
      count: 30
      percentage: 30%
      description: |
        包含 AI Agent、LLM 应用、AI 开发框架、AI 平台
        
      subcategories:
        - category: AI Agent 框架
          examples: [AutoGPT, n8n, MetaGPT, AgentGPT]
          characteristics:
            - 自主任务执行
            - 工具调用
            - 多 Agent 协作
            - 
        - category: LLM 开发框架
          examples: [LangChain, transformers, LLaMA Factory, unsloth]
          characteristics:
            - 模型集成
            - Prompt 管理
            - RAG 支持
            - 微调工具
            
        - category: AI 应用平台
          examples: [Dify, Lobe Chat, Cherry Studio, RAGFlow]
          characteristics:
            - 可视化界面
            - 低代码/无代码
            - 模型管理
            - 工作流编排
            
        - category: AI 基础设施
          examples: [vLLM, Ollama, Mem0, OpenHands]
          characteristics:
            - 模型部署
            - 推理优化
            - 记忆管理
            - 代码生成
            
    # 2. 前端框架/库
    frontend:
      count: 25
      percentage: 25%
      description: |
        包含 UI 框架、组件库、构建工具、CSS 框架
        
      subcategories:
        - category: UI 框架
          examples: [React, Vue, Angular, Svelte]
          characteristics:
            - 组件系统
            - 响应式
            - 虚拟 DOM
            
        - category: 全栈框架
          examples: [Next.js, Nuxt.js, Astro]
          characteristics:
            - SSR/SSG
            - 路由
            - API Routes
            
        - category: CSS 框架
          examples: [Bootstrap, Tailwind, shadcn]
          characteristics:
            - 响应式
            - 组件
            - 主题系统
            
        - category: 构建工具
          examples: [Vite, Webpack, Turbopack]
          characteristics:
            - 打包
            - 开发服务器
            - 插件系统
            
    # 3. 开发工具
    dev_tools:
      count: 20
      percentage: 20%
      description: |
        包含编辑器、CLI 工具、自动化工具、代码质量工具
        
      subcategories:
        - category: 代码编辑器
          examples: [VS Code, Zed, Lapce, CodeBuddy]
          characteristics:
            - 插件系统
            - LSP 支持
            - 多语言
            
        - category: Shell 框架
          examples: [Oh My Zsh, PowerShell, bash]
          characteristics:
            - 插件
            - 主题
            - 自动补全
            
        - category: 自动化工具
          examples: [n8n, GitHub Actions, GitLab CI]
          characteristics:
            - 工作流
            - 触发器
            - 集成
            
    # 4. 学习资源
    learning_resources:
      count: 15
      percentage: 15%
      description: |
        主要是文档、教程、学习路线
        
      examples:
        - build-your-own-x
        - awesome 系列
        - freeCodeCamp
        - system-design-primer
        - developer-roadmap
        
    # 5. 基础设施/系统
    infrastructure:
      count: 10
      percentage: 10%
      description: |
        包含操作系统、容器、Kubernetes、CI/CD
        
      examples:
        - linux
        - docker
        - kubernetes
        - terraform
        - ansible
        
## 三、架构模式分布

architecture_patterns:
  # 基于项目特征推断的架构模式
  patterns:
    # 1. 前后端分离
    frontend_backend_separation:
      count: 40
      percentage: 40%
      description: |
        前端项目 + 后端 API 分离
        
      common_stack:
        frontend: [React, Vue, Next.js, Angular]
        backend: [Node.js, Python, Go, Java]
        api: [REST, GraphQL, gRPC]
        
      examples:
        - freeCodeCamp (React + Node.js)
        - n8n (TypeScript 全栈)
        - vscode (TypeScript + Electron)
        
    # 2. 单体应用
    monolith:
      count: 30
      percentage: 30%
      description: |
        所有功能在单个应用中
        
      common_stack:
        - Python (Django, Flask)
        - Node.js (Express)
        - Go (Gin, Echo)
        
      examples:
        - stable-diffusion-webui
        - AutoGPT
        - RAGFlow
        
    # 3. 微服务架构
    microservices:
      count: 15
      percentage: 15%
      description: |
        服务拆分，独立部署
        
      common_stack:
        - Go (gRPC)
        - Java (Spring Cloud)
        - Python (FastAPI)
        
      examples:
        - Spring Cloud 项目
        - Kubernetes 相关
        - 企业级应用
        
    # 4. Monorepo
    monorepo:
      count: 25
      percentage: 25%
      description: |
        多个包/应用在同一仓库
        
      tools:
        - pnpm workspaces
        - yarn workspaces
        - Turborepo
        - Lerna
        - NX
        
      examples:
        - vscode (monorepo)
        - freeCodeCamp (monorepo)
        - n8n (monorepo)
        
    # 5. 无服务器/Serverless
    serverless:
      count: 10
      percentage: 10%
      description: |
        函数即服务
        
      platforms:
        - Vercel
        - AWS Lambda
        - Cloudflare Workers
        
      examples:
        - Next.js 部署到 Vercel
        - Serverless Framework
        
## 四、CI/CD 配置分布

cicd_distribution:
  # 基于 GitHub Top 100 项目的 CI/CD 配置分析
  configurations:
    github_actions:
      count: 80
      percentage: 80%
      description: |
        GitHub Actions 是主流选择
        
      common_workflows:
        - CI (测试)
        - CD (部署)
        - PR 检查
        - 代码质量
        - 安全扫描
        
    gitlab_ci:
      count: 10
      percentage: 10%
      description: |
        主要用于使用 GitLab 的项目
        
    jenkins:
      count: 5
      percentage: 5%
      description: |
        主要用于大型企业项目
        
    custom_ci:
      count: 5
      percentage: 5%
      description: |
        自定义 CI 系统
        
  # CI/CD 特征
  cicd_features:
    common_practices:
      - "PR 触发测试"
      - "自动代码审查"
      - "自动部署到 staging"
      - "生产环境手动确认"
      - "代码覆盖率检查"
      - "安全扫描"
      
    quality_gates:
      - "测试通过率 100%"
      - "代码覆盖率阈值"
      - "无高危安全漏洞"
      - "无阻塞的 lint 错误"
      

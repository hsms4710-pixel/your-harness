## 微服务模板

### TPL-008: 服务边界设计模板

```yaml
id: TPL-008
name: service-boundary-design
category: microservice
version: 1.0.0

structure:
  header:
    required_skill: "executing-plans"
    
  variables:
    - service_name: "服务名称"
    - service_responsibilities: "服务职责"
    
  scope_checklist:
    - "服务的职责边界是什么？"
    - "服务依赖哪些其他服务？"
    - "服务暴露哪些接口？"
    
  tasks_template: |
    ## Task 1: 职责定义
    
    **Goal:** 定义服务职责
    
    **Steps:**
    1. 分析业务需求
    2. 定义服务边界
    3. 确定服务职责
    
    **Output:** 服务职责文档
    
    ---
    
    ## Task 2: 接口设计
    
    **Goal:** 设计服务接口
    
    **Steps:**
    1. 设计 API 契约
    2. 定义数据格式
    3. 设计错误处理
    
    **Output:** 接口定义文档
    
    ---
    
    ## Task 3: 依赖分析
    
    **Goal:** 分析服务依赖
    
    **Steps:**
    1. 识别上游服务
    2. 识别下游服务
    3. 设计依赖关系
    
    **Output:** 依赖关系图
    
    ---
    
    ## 完工检查清单
    
    - [ ] 服务职责已定义
    - [ ] 接口已设计
    - [ ] 依赖已分析

  completion_checklist:
    - "服务职责已定义"
    - "接口已设计"
    - "依赖已分析"
```


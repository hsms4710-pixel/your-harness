# Template 元素模板

## 基础模板

### TPL-001: 功能开发模板

```yaml
id: TPL-001
name: feature-development
category: development
version: 1.0.0

structure:
  header:
    required_skill: "executing-plans"
    
  variables:
    - feature_name: "功能名称"
    - project_path: "项目路径"
    - language: "主要语言"
    - framework: "主要框架"
    
  scope_checklist:
    - "是否需要改数据库结构？"
    - "是否需要改 API？"
    - "是否需要改前端？"
    - "是否需要改配置？"
    
  tasks_template: |
    ## Task 1: 需求分析
    
    **Goal:** 理解功能需求
    
    **Steps:**
    1. 阅读需求文档
    2. 识别功能边界
    3. 确定验收标准
    
    **Output:** 需求理解文档
    
    ---
    
    ## Task 2: 任务拆解
    
    **Goal:** 将功能拆解为可执行任务
    
    **Steps:**
    1. 按模块拆解
    2. 识别依赖关系
    3. 估算工作量
    
    **Output:** 任务列表
    
    ---
    
    ## Task 3: 实现
    
    **Goal:** 实现功能代码
    
    **Files:**
    - 创建/修改: `{file_list}`
    
    **Steps:**
    1. 按任务实现代码
    2. 编写测试
    3. 代码审查
    
    **Output:** 代码 + 测试
    
    ---
    
    ## 完工检查清单
    
    - [ ] 需求已理解
    - [ ] 任务已拆解
    - [ ] 代码已实现
    - [ ] 测试已通过
    - [ ] 代码审查已通过

  completion_checklist:
    - "需求已理解"
    - "任务已拆解"
    - "代码已实现"
    - "测试已通过"
    - "代码审查已通过"
```

### TPL-002: Bug 修复模板

```yaml
id: TPL-002
name: bugfix-development
category: development
version: 1.0.0

structure:
  header:
    required_skill: "executing-plans"
    
  variables:
    - bug_id: "Bug ID"
    - bug_description: "Bug 描述"
    - severity: "严重程度"
    
  scope_checklist:
    - "Bug 的复现步骤是什么？"
    - "影响范围是什么？"
    - "是否需要修复数据？"
    
  tasks_template: |
    ## Task 1: Bug 分析
    
    **Goal:** 理解 Bug 原因
    
    **Steps:**
    1. 复现 Bug
    2. 分析代码
    3. 确定根因
    
    **Output:** Bug 分析报告
    
    ---
    
    ## Task 2: 修复
    
    **Goal:** 修复 Bug
    
    **Files:**
    - 修改: `{affected_files}`
    
    **Steps:**
    1. 实现修复
    2. 编写测试
    3. 验证修复
    
    **Output:** 修复代码 + 测试
    
    ---
    
    ## 完工检查清单
    
    - [ ] Bug 原因已确定
    - [ ] 修复已实现
    - [ ] 测试已通过
    - [ ] 无回归

  completion_checklist:
    - "Bug 原因已确定"
    - "修复已实现"
    - "测试已通过"
    - "无回归"
```

## AI/LLM 模板

### TPL-003: Prompt 工程模板

```yaml
id: TPL-003
name: prompt-engineering
category: ai-llm
version: 1.0.0

structure:
  header:
    required_skill: "executing-plans"
    
  variables:
    - prompt_name: "Prompt 名称"
    - input_description: "输入描述"
    - output_description: "输出描述"
    - model: "使用的模型"
    
  scope_checklist:
    - "Prompt 的输入是什么格式？"
    - "期望的输出是什么格式？"
    - "是否有示例？"
    - "是否有特殊要求？"
    
  tasks_template: |
    ## Task 1: 需求分析
    
    **Goal:** 理解 Prompt 需求
    
    **Steps:**
    1. 分析使用场景
    2. 确定输入输出格式
    3. 收集示例
    
    **Output:** Prompt 需求文档
    
    ---
    
    ## Task 2: Prompt 设计
    
    **Goal:** 设计 Prompt 结构
    
    **Steps:**
    1. 设计系统提示
    2. 设计用户提示模板
    3. 添加示例（如需要）
    
    **Output:** Prompt 设计
    
    ---
    
    ## Task 3: 测试验证
    
    **Goal:** 验证 Prompt 效果
    
    **Steps:**
    1. 编写测试用例
    2. 执行测试
    3. 分析结果
    
    **Output:** 测试报告
    
    ---
    
    ## Task 4: 优化迭代
    
    **Goal:** 优化 Prompt
    
    **Steps:**
    1. 分析失败案例
    2. 调整 Prompt
    3. 重新测试
    
    **Output:** 优化后的 Prompt
    
    ---
    ## 完工检查清单
    
    - [ ] Prompt 需求已明确
    - [ ] Prompt 结构已设计
    - [ ] 测试已通过
    - [ ] 效果已验证

  completion_checklist:
    - "Prompt 需求已明确"
    - "Prompt 结构已设计"
    - "测试已通过"
    - "效果已验证"
```

### TPL-004: AI 安全模板

```yaml

## 安全模板

### TPL-006: 认证授权模板

```yaml
id: TPL-006
name: authentication-authorization
category: security
version: 1.0.0

structure:
  header:
    required_skill: "executing-plans"
    
  variables:
    - auth_method: "认证方式"
    - permission_model: "权限模型"
    
  scope_checklist:
    - "使用什么认证方式？"
    - "需要什么级别的权限控制？"
    - "是否有合规要求？"
    
  tasks_template: |
    ## Task 1: 认证设计
    
    **Goal:** 设计认证方案
    
    **Steps:**
    1. 选择认证方式
    2. 设计凭证存储
    3. 设计会话管理
    
    **Output:** 认证设计方案
    
    ---
    
    ## Task 2: 授权设计
    
    **Goal:** 设计授权方案
    
    **Steps:**
    1. 定义角色
    2. 定义权限
    3. 设计访问控制
    
    **Output:** 授权设计方案
    
    ---
    
    ## Task 3: 实现
    
    **Goal:** 实现认证授权
    
    **Steps:**
    1. 实现认证逻辑
    2. 实现授权逻辑
    3. 实现会话管理
    
    **Output:** 认证授权代码
    
    ---
    
    ## Task 4: 安全审查
    
    **Goal:** 审查安全实现
    
    **Steps:**
    1. 审查认证实现
    2. 审查授权实现
    3. 测试攻击场景
    
    **Output:** 安全审查报告
    
    ---
    ## 完工检查清单
    
    - [ ] 认证方案已设计
    - [ ] 授权方案已设计
    - [ ] 实现已完成
    - [ ] 安全审查已通过

  completion_checklist:
    - "认证方案已设计"
    - "授权方案已设计"
    - "实现已完成"
    - "安全审查已通过"
```


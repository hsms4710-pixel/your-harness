    2. 设计内容过滤
    3. 设计输出验证
    
    **Output:** 防护设计方案
    
    ---
    
    ## Task 3: 实现
    
    **Goal:** 实现安全防护
    
    **Steps:**
    1. 实现输入验证
    2. 实现内容过滤
    3. 实现输出验证
    
    **Output:** 安全防护代码
    
    ---
    
    ## Task 4: 测试
    
    **Goal:** 测试安全防护
    
    **Steps:**
    1. 测试正常场景
    2. 测试攻击场景
    3. 测试边界情况
    
    **Output:** 安全测试报告
    
    ---
    ## 完工检查清单
    
    - [ ] 安全风险已识别
    - [ ] 防护方案已设计
    - [ ] 防护已实现
    - [ ] 测试已通过

  completion_checklist:
    - "安全风险已识别"
    - "防护方案已设计"
    - "防护已实现"
    - "测试已通过"
```


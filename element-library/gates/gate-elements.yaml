# Gate 元素定义

## 通用闸门

### GATE-001: 需求确认闸门

```yaml
id: GATE-001
name: requirement-confirmation
category: universal
version: 1.0.0

stage: "需求理解"
order: 0

required_artifacts:
  - name: "需求文档"
    path: "docs/spec/{feature}/analyze/00-requirements.md"
    type: "markdown"
    
  - name: "澄清记录"
    path: "docs/spec/{feature}/analyze/01-clarifications.md"
    type: "markdown"
    optional: true

checks:
  - id: CHK-001
    name: "需求已完整收集"
    method: "manual"
    description: "检查需求文档是否完整覆盖所有功能点"
    
  - id: CHK-002
    name: "模糊点已澄清"
    method: "manual"
    description: "检查是否有未解决的模糊点"
    
  - id: CHK-003
    name: "用户已确认理解"
    method: "manual"
    description: "检查用户是否确认理解正确"

approval_required: true
user_confirmation_required: true

output_template: |
  ## Gate: G0_REQUIREMENT
  
  **状态**：{status}
  
  **本阶段产物**
  - docs/spec/{feature}/analyze/00-requirements.md
  - docs/spec/{feature}/analyze/01-clarifications.md (如有)
  
  **通过标准**
  - [ ] 需求已完整收集
  - [ ] 模糊点已澄清
  - [ ] 用户已确认理解
  
  **需要用户确认**
  1. 通过，进入下一阶段
  2. 有问题，按反馈修改
  3. 暂停，不继续
```

### GATE-002: 任务确认闸门

```yaml
id: GATE-002
name: task-confirmation
category: universal
version: 1.0.0

stage: "任务分解"
order: 1

required_artifacts:
  - name: "任务列表"
    path: "docs/spec/{feature}/design/00-tasks.md"
    type: "markdown"
    
  - name: "依赖关系图"
    path: "docs/spec/{feature}/design/01-dependencies.md"
    type: "markdown"
    optional: true

checks:
  - id: CHK-001
    name: "任务粒度合理"
    method: "manual"
    description: "检查每个任务是否可以独立完成"
    
  - id: CHK-002
    name: "依赖关系明确"
    method: "manual"
    description: "检查任务间的依赖关系是否清晰"
    
  - id: CHK-003
    name: "工作量估算合理"
    method: "manual"
    description: "检查工作量估算是否合理"

approval_required: true
user_confirmation_required: true

output_template: |

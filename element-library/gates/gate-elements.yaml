  3. 暂停，不继续
```

### GATE-006: 上线审批闸门

```yaml
id: GATE-006
name: deployment-approval
category: universal
version: 1.0.0

stage: "上线"
order: 5

required_artifacts:
  - name: "部署配置"
    path: "deploy/**/*"
    type: "config"
    
  - name: "回滚方案"
    path: "docs/spec/{feature}/develop/rollback-plan.md"
    type: "markdown"
    
  - name: "监控告警配置"
    path: "docs/spec/{feature}/develop/monitoring-config.md"
    type: "markdown"

checks:
  - id: CHK-001
    name: "部署配置已准备"
    method: "manual"
    description: "检查部署配置是否已准备"
    
  - id: CHK-002
    name: "回滚方案已准备"
    method: "manual"
    description: "检查回滚方案是否已准备"
    
  - id: CHK-003
    name: "监控告警已配置"
    method: "manual"
    description: "检查监控告警是否已配置"
    
  - id: CHK-004
    name: "上线窗口已确认"
    method: "manual"
    description: "检查上线窗口是否已确认"

approval_required: true
user_confirmation_required: true

output_template: |
  ## Gate: G5_DEPLOY
  
  **状态**：{status}
  
  **本阶段产物**
  - deploy/**/*
  - docs/spec/{feature}/develop/rollback-plan.md
  - docs/spec/{feature}/develop/monitoring-config.md
  
  **通过标准**
  - [ ] 部署配置已准备
  - [ ] 回滚方案已准备
  - [ ] 监控告警已配置
  - [ ] 上线窗口已确认
  
  **需要用户确认**
  1. 通过，可以开始上线
  2. 有问题，按反馈修改
  3. 暂停，不继续
```


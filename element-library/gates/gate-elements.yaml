  **状态**：{status}
  
  **本阶段产物**
  - docs/spec/{feature}/design/00-tasks.md
  
  **通过标准**
  - [ ] 任务粒度合理
  - [ ] 依赖关系明确
  - [ ] 工作量估算合理
  
  **需要用户确认**
  1. 通过，进入下一阶段
  2. 有问题，按反馈修改
  3. 暂停，不继续
```


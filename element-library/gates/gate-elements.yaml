### GATE-004: 代码审查闸门

```yaml
id: GATE-004
name: code-review
category: universal
version: 1.0.0

stage: "实现"
order: 3

required_artifacts:
  - name: "代码"
    path: "src/**/*"
    type: "code"
    
  - name: "测试代码"
    path: "tests/**/*"
    type: "code"
    
  - name: "代码审查记录"
    path: "docs/spec/{feature}/develop/review.md"
    type: "markdown"

checks:
  - id: CHK-001
    name: "代码通过 lint 检查"
    method: "script"
    script: "check-lint.py"
    description: "检查代码是否通过 lint"
    
  - id: CHK-002
    name: "测试通过"
    method: "script"
    script: "run-tests.py"
    description: "检查测试是否全部通过"
    
  - id: CHK-003
    name: "代码审查通过"
    method: "manual"
    description: "检查代码是否通过审查"

approval_required: true
user_confirmation_required: true
per_task: true

output_template: |
  ## Gate: G3_CODE
  
  **状态**：{status}
  
  **本阶段产物**
  - src/**/*
  - tests/**/*
  - docs/spec/{feature}/develop/review.md
  
  **通过标准**
  - [ ] 代码通过 lint 检查
  - [ ] 测试通过
  - [ ] 代码审查通过
  
  **需要用户确认**
  1. 通过，进入下一阶段
  2. 有问题，按反馈修改
  3. 暂停，不继续
```

### GATE-005: 质量检查闸门

